<!DOCTYPE html>
<html>
<head>
  <title>Shahidul Islam - Web Developer</title>
  <style>
    /* ========== Global Style ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background-color: #f5f7fa;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #333;
      line-height: 1.6;
    }
    
    /* ========== Container ========== */
    .container {
      max-width: 800px;
      margin: 30px auto;
      background-color: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
    }
    
    /* ========== Profile Image ========== */
    .profile-img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid #0066cc;
      object-fit: cover;
      margin-bottom: 20px;
    }
    
    /* ========== Typography ========== */
    h1 {
      color: #0066cc;
      font-size: 32px;
      margin-bottom: 10px;
    }
    
    h2 {
      color: #333;
      font-size: 24px;
      margin: 30px 0 15px 0;
      border-bottom: 2px solid #0066cc;
      display: inline-block;
      padding-bottom: 5px;
    }
    
    .subtitle {
      color: #666;
      font-size: 18px;
      margin-bottom: 20px;
    }
    
    /* ========== About Box ========== */
    .about-box {
      background-color: #f0f8ff;
      padding: 20px;
      border-radius: 8px;
      border-left: 4px solid #0066cc;
      text-align: left;
      margin: 20px 0;
    }
    
    /* ========== Skills Badge ========== */
    .skills {
      margin: 20px 0;
    }
    
    .skill-badge {
      background-color: #0066cc;
      color: white;
      padding: 8px 15px;
      margin: 5px;
      border-radius: 20px;
      display: inline-block;
      font-size: 14px;
      font-weight: 500;
    }
    
    /* ========== Project List ========== */
    .projects {
      text-align: left;
      max-width: 500px;
      margin: 0 auto;
    }
    
    .project-item {
      background-color: #fafafa;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border-left: 3px solid #0066cc;
    }
    
    /* ========== Table ========== */
    table {
      width: 100%;
      max-width: 500px;
      margin: 20px auto;
      border-collapse: collapse;
    }
    
    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
    }
    
    th {
      background-color: #0066cc;
      color: white;
    }
    
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    
    /* ========== Contact & Links ========== */
    .contact {
      margin: 30px 0;
    }
    
    a {
      color: #0066cc;
      text-decoration: none;
      font-weight: 500;
    }
    
    a:hover {
      text-decoration: underline;
      color: #004c99;
    }
    
    .btn {
      background-color: #0066cc;
      color: white;
      padding: 10px 25px;
      border-radius: 25px;
      display: inline-block;
      margin: 10px 5px;
      text-decoration: none;
    }
    
    .btn:hover {
      background-color: #004c99;
      text-decoration: none;
    }
    
    /* ========== Footer ========== */
    footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
      color: #888;
      font-size: 14px;
    }
